<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>i-Prime · Machine Calling Simulator</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --chrome:     #b0b8c0;
  --panel:      #e8ecef;
  --surface:    #f4f6f8;
  --white:      #ffffff;
  --border:     #707880;
  --border-hvy: #3a3f44;
  --txt:        #101418;
  --txt-dim:    #505860;
  --txt-lbl:    #303840;
  --small:      #005ab4;
  --big:        #a04000;
}

html, body {
  height: 100%; background: var(--chrome);
  font-family: Arial, Helvetica, sans-serif;
  font-size: 15px; color: var(--txt);
  display: flex; flex-direction: column; overflow: hidden;
}

/* ── Title bar ──────────────────────────────────────────── */
.titlebar {
  background: var(--border-hvy); color: #fff; height: 50px; padding: 0 16px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0; border-bottom: 3px solid #000;
}
.title { font-size: 19px; font-weight: bold; letter-spacing: 1px; }
.sub   { font-size: 12px; color: #b0b8c0; margin-left: 12px; }
.clock { font-size: 24px; font-weight: bold; font-family: 'Courier New', monospace; }

/* ── Centre panel ───────────────────────────────────────── */
.centre {
  flex: 1; display: flex; align-items: center; justify-content: center;
}

.station {
  background: var(--surface); border: 3px solid var(--border-hvy);
  border-radius: 10px; padding: 28px 36px;
  display: flex; flex-direction: column; align-items: center; gap: 20px;
  box-shadow: 0 4px 12px rgba(0,0,0,.25);
  min-width: 280px;
}

/* ── Line selector ──────────────────────────────────────── */
.station label {
  font-size: 12px; font-weight: bold; text-transform: uppercase;
  letter-spacing: 2px; color: var(--txt-lbl); align-self: stretch; text-align: left;
}

.station select {
  font-family: inherit; font-size: 17px; font-weight: bold;
  padding: 10px 14px; border: 2px solid var(--border); border-radius: 6px;
  background: var(--white); color: var(--txt); cursor: pointer;
  width: 100%; box-shadow: 0 2px 0 var(--border-hvy);
}
.station select:focus { outline: 3px solid var(--small); border-color: var(--small); }

/* ── Variant buttons ────────────────────────────────────── */
.var-btn {
  width: 100%; padding: 22px 16px;
  border: 3px solid; border-radius: 8px;
  font-family: inherit; font-size: 22px; font-weight: bold; cursor: pointer;
  text-transform: uppercase; letter-spacing: 2px;
  transition: filter .1s, transform .1s;
}
.var-btn:disabled { opacity: .38; cursor: not-allowed; box-shadow: none !important; }
.var-btn:not(:disabled):hover  { filter: brightness(1.08); }
.var-btn:not(:disabled):active { transform: translateY(3px); box-shadow: none !important; }

.var-btn.small {
  background: #dce8f8; border-color: var(--small); color: var(--small);
  box-shadow: 0 4px 0 #002060;
}
.var-btn.big {
  background: #fdf0de; border-color: var(--big); color: var(--big);
  box-shadow: 0 4px 0 #5a2000;
}
.var-btn.fired { animation: flash .35s ease; }
@keyframes flash { 0% { filter: brightness(2.2); } 100% { filter: brightness(1); } }
</style>
</head>
<body>

<div class="titlebar">
  <div>
    <span class="title">i-Prime &mdash; Calling Station Simulator</span>
    <span class="sub">Goodyear</span>
  </div>
  <div class="clock" id="clock">--:--:--</div>
</div>

<div class="centre">
  <div class="station">

    <label>Line</label>
    <select id="sel-line">
      <option value="">— select line —</option>
      {% for line in lines %}
      <option value="{{ line }}">{{ line }}</option>
      {% endfor %}
    </select>

    <button class="var-btn small" id="btn-small" disabled onclick="sendCall('SMALL_LORRY_12U', this)">
      &#9651;&nbsp; SMALL &nbsp;12U
    </button>

    <button class="var-btn big" id="btn-big" disabled onclick="sendCall('BIG_LORRY_16U', this)">
      &#9650;&nbsp; BIG &nbsp;16U
    </button>

  </div>
</div>

<script>
setInterval(() => {
  document.getElementById('clock').textContent = new Date().toTimeString().slice(0, 8);
}, 500);

document.getElementById('sel-line').addEventListener('change', function() {
  const ok = !!this.value;
  document.getElementById('btn-small').disabled = !ok;
  document.getElementById('btn-big').disabled   = !ok;
});

function sendCall(lorryVariant, btn) {
  const line = document.getElementById('sel-line').value;
  if (!line) return;

  btn.classList.remove('fired');
  void btn.offsetWidth;
  btn.classList.add('fired');

  fetch('/api/call', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({line, lorry_variant: lorryVariant})
  });
}

/* Keyboard: S = SMALL, B = BIG */
document.addEventListener('keydown', e => {
  const sel = document.getElementById('sel-line');
  if (!sel.value) return;
  if (e.key === 's' || e.key === 'S') sendCall('SMALL_LORRY_12U', document.getElementById('btn-small'));
  if (e.key === 'b' || e.key === 'B') sendCall('BIG_LORRY_16U',   document.getElementById('btn-big'));
});
</script>
</body>
</html>
